<section class="login-page">
  <div class="login-panel">
    <div class="intro">
      <span>Grupo Qualivida</span>
      <h1>Acesso ao sistema</h1>
      <p>Entre para acompanhar visitas domiciliares, iniciar atendimentos e registrar evolucoes clinicas.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>
        Email
        <input type="email" formControlName="email" autocomplete="email" />
      </label>

      <label>
        Senha
        <input type="password" formControlName="senha" autocomplete="current-password" />
      </label>

      @if (errorMessage) {
        <p class="error">{{ errorMessage }}</p>
      }

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>
  </div>

  <aside class="access-card">
    <h2>Contas do seed</h2>
    <dl>
      <div>
        <dt>Admin</dt>
        <dd>admin&#64;qualivida.com</dd>
      </div>
      <div>
        <dt>Profissional</dt>
        <dd>enfermeira&#64;qualivida.com</dd>
      </div>
    </dl>
  </aside>
</section>
